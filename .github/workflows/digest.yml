name: Daily Digest

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenCode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Generate digest
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          TODAY=$(date +%Y-%m-%d)
          opencode run --agent digest "Generate today's digest"
          if [ ! -f "digests/daily/${TODAY}.md" ]; then
            echo "::error::Digest file digests/daily/${TODAY}.md was not created"
            exit 1
          fi

      - name: Sync digests to docs
        run: |
          mkdir -p docs/digests
          cp digests/daily/*.md docs/digests/
          ls docs/digests/*.md | sed 's|.*/||;s|\.md||' | sort | jq -R . | jq -s . > docs/digests/manifest.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/daily/ docs/
          if ! git diff --cached --quiet; then
            git commit -m "daily digest: $(date +%Y-%m-%d)"
            git push
          fi
