name: Daily Digest

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenCode
        run: curl -fsSL https://opencode.ai/install | bash

      - name: Generate digest
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
        run: opencode run --agent digest "Generate today's digest"

      - name: Sync digests to docs
        run: |
          mkdir -p docs/digests
          cp digests/daily/*.md docs/digests/
          ls docs/digests/*.md | sed 's|.*/||;s|\.md||' | sort | jq -R . | jq -s . > docs/digests/manifest.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/daily/ docs/
          if ! git diff --cached --quiet; then
            git commit -m "daily digest: $(date +%Y-%m-%d)"
            git push
          fi
